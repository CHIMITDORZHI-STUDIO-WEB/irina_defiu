<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ирина Семенова — Blue Diamond лидер DeFi-U | Ultima</title>
    <meta name="description" content="Ирина Семенова — Blue Diamond лидер международной команды DeFi-U. Присоединяйтесь к команде и начните зарабатывать с Ultima.">
    <meta name="theme-color" content="#0a1628">
    <meta property="og:title" content="Ирина Семенова — Blue Diamond лидер DeFi-U">
    <meta property="og:description" content="Международный лидер экосистемы Ultima. Присоединяйтесь к команде!">
    <meta property="og:image" content="photo_2026-03-14_22-06-35.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #1e90ff;
            --accent-light: #4da6ff;
            --gold: #c9a84c;
            --gold-light: #e8d48b;
            --radius: 20px;
            --transition: 0.35s cubic-bezier(.4,0,.2,1);
        }

        [data-theme="dark"] {
            --bg: #0a1628; --bg2: #0f2847; --bg3: #132d5e;
            --surface: rgba(15,40,71,0.8); --surface2: rgba(10,22,40,0.9);
            --text: #ffffff; --text2: #a0b0c4; --text3: #7a8fa8;
            --border: rgba(30,144,255,0.12); --border2: rgba(30,144,255,0.06);
            --shadow: rgba(0,0,0,0.4); --shadow2: rgba(0,0,0,0.2);
            --nav-bg: rgba(10,22,40,0.92); --card-hover: rgba(30,144,255,0.06);
            --icon-bg: rgba(30,144,255,0.1); --icon-c: #4da6ff;
            --hero-g: linear-gradient(135deg,#0a1628,#0f2847 50%,#132d5e);
            --cta-g: linear-gradient(135deg,#0a1628,#0f2847 50%,#132d5e);
        }

        [data-theme="light"] {
            --bg: #f4f7fb; --bg2: #e8edf4; --bg3: #dce3ed;
            --surface: rgba(255,255,255,0.92); --surface2: rgba(245,248,252,0.95);
            --text: #1a202c; --text2: #4a5568; --text3: #718096;
            --border: rgba(30,144,255,0.12); --border2: rgba(30,144,255,0.06);
            --shadow: rgba(0,0,0,0.08); --shadow2: rgba(0,0,0,0.04);
            --nav-bg: rgba(255,255,255,0.92); --card-hover: rgba(30,144,255,0.04);
            --icon-bg: rgba(30,144,255,0.08); --icon-c: #1e70d0;
            --hero-g: linear-gradient(135deg,#e8f0fe,#d4e4f7 50%,#c3d9f0);
            --cta-g: linear-gradient(135deg,#e8f0fe,#d4e4f7 50%,#c3d9f0);
        }

        html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Montserrat',system-ui,sans-serif;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background var(--transition), color var(--transition);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== NAV ===== */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            padding: 14px 24px; display: flex; justify-content: space-between;
            align-items: center; transition: all var(--transition);
        }
        .nav.scrolled {
            background: var(--nav-bg); backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            box-shadow: 0 1px 30px var(--shadow2);
        }
        .nav-logo { font-size: 20px; font-weight: 800; color: var(--text); text-decoration: none; white-space: nowrap; }
        .nav-logo b { color: var(--accent); }
        .nav-right { display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; gap: 22px; list-style: none; align-items: center; }
        .nav-links a {
            color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 500;
            transition: color .2s; position: relative; padding: 4px 0;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px;
            background: var(--accent); border-radius: 2px; transition: width .3s;
        }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .nav-links a:hover { color: var(--text); }
        .nav-cta {
            background: linear-gradient(135deg,#1e90ff,#4da6ff) !important;
            color: #fff !important; padding: 9px 22px !important; border-radius: 25px;
            font-weight: 700 !important; font-size: 13px !important;
            box-shadow: 0 4px 15px rgba(30,144,255,.25);
            transition: transform .2s, box-shadow .2s;
        }
        .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(30,144,255,.35); }
        .nav-cta::after { display: none !important; }

        /* Pill switchers */
        .pill { display: flex; gap: 2px; background: var(--icon-bg); border: 1px solid var(--border); border-radius: 22px; padding: 3px; }
        .pill button {
            padding: 5px 11px; border: none; background: transparent; color: var(--text3);
            font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer;
            border-radius: 18px; transition: all .25s; letter-spacing: .5px;
        }
        .pill button.on { background: linear-gradient(135deg,#1e90ff,#4da6ff); color: #fff; }
        .theme-btn {
            width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--icon-bg); cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all .25s; flex-shrink: 0;
        }
        .theme-btn svg { width: 17px; height: 17px; stroke: var(--icon-c); fill: none; stroke-width: 2; transition: transform .4s; }
        .theme-btn:hover { border-color: var(--accent); }
        .theme-btn:hover svg { transform: rotate(20deg); }

        /* Burger */
        .burger {
            display: none; width: 40px; height: 40px; border: none; background: none;
            cursor: pointer; position: relative; flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .burger i { position: absolute; left: 8px; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: all .3s; }
        .burger i:nth-child(1) { top: 12px; }
        .burger i:nth-child(2) { top: 19px; }
        .burger i:nth-child(3) { top: 26px; }
        .burger.open i:nth-child(1) { top: 19px; transform: rotate(45deg); }
        .burger.open i:nth-child(2) { opacity: 0; transform: translateX(-8px); }
        .burger.open i:nth-child(3) { top: 19px; transform: rotate(-45deg); }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh; min-height: 100svh; display: flex; align-items: center;
            justify-content: center; position: relative; overflow: hidden;
            background: var(--hero-g); transition: background var(--transition);
            padding: env(safe-area-inset-top) 0 0;
        }
        .hero::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 50%,rgba(30,144,255,.07) 0%,transparent 50%),
                        radial-gradient(ellipse at 70% 20%,rgba(201,168,76,.05) 0%,transparent 40%);
            animation: heroBg 25s ease-in-out infinite;
        }
        @keyframes heroBg { 0%,100%{transform:translate(0,0) rotate(0)} 50%{transform:translate(-2%,1%) rotate(.5deg)} }

        .particles { position: absolute; inset: 0; overflow: hidden; }
        .dot {
            position: absolute; width: 2px; height: 2px; background: var(--accent);
            border-radius: 50%; opacity: .2; animation: rise linear infinite;
        }
        [data-theme="light"] .dot { opacity: .12; }
        @keyframes rise {
            0%{transform:translateY(100vh) scale(0);opacity:0} 8%{opacity:.25} 92%{opacity:.25}
            100%{transform:translateY(-5vh) scale(1);opacity:0}
        }

        .hero-inner {
            position: relative; z-index: 2; display: flex; align-items: center; gap: 56px;
            max-width: 1160px; width: 100%; padding: 100px 24px 60px; flex-wrap: wrap; justify-content: center;
        }
        .photo-wrap { position: relative; flex-shrink: 0; }
        .photo-wrap::before {
            content: ''; position: absolute; inset: -5px; border-radius: 50%;
            background: linear-gradient(135deg,#c9a84c,#e8d48b,#c9a84c);
            z-index: -1; animation: glow 3s ease-in-out infinite;
        }
        @keyframes glow { 0%,100%{box-shadow:0 0 25px rgba(201,168,76,.3)} 50%{box-shadow:0 0 55px rgba(201,168,76,.5)} }

        .photo-wrap img {
            width: 280px; height: 280px; border-radius: 50%; object-fit: cover;
            object-position: center top; border: 4px solid var(--bg); display: block;
        }
        .hero-txt { max-width: 520px; }
        .badge {
            display: inline-flex; align-items: center; gap: 9px;
            background: linear-gradient(135deg,rgba(201,168,76,.18),rgba(201,168,76,.08));
            border: 1px solid var(--gold); border-radius: 30px; padding: 7px 18px;
            font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 18px;
        }
        .badge svg { width: 16px; height: 16px; stroke: var(--gold); fill: none; stroke-width: 2; }
        .hero-txt h1 { font-size: 46px; font-weight: 800; line-height: 1.08; margin-bottom: 14px; }
        [data-theme="dark"] .hero-txt h1 {
            background: linear-gradient(135deg,#fff,#a0b0c4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        [data-theme="light"] .hero-txt h1 { color: #1a202c; }
        .hero-txt h1 span {
            background: linear-gradient(135deg,#c9a84c,#e8d48b,#c9a84c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .hero-txt p { font-size: 17px; color: var(--text2); line-height: 1.65; margin-bottom: 28px; font-weight: 300; }

        .btn-primary {
            display: inline-flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg,#1e90ff,#4da6ff); color: #fff;
            padding: 15px 36px; border-radius: 50px; text-decoration: none;
            font-weight: 700; font-size: 15px; transition: all .25s;
            box-shadow: 0 6px 25px rgba(30,144,255,.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 35px rgba(30,144,255,.4); }
        .btn-primary .arr { transition: transform .25s; font-size: 18px; }
        .btn-primary:hover .arr { transform: translateX(4px); }

        .scroll-hint {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 2; animation: bob 2s infinite; opacity: .4;
        }
        @keyframes bob { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-8px)} }
        .scroll-hint svg { width: 28px; height: 28px; stroke: var(--accent-light); fill: none; stroke-width: 2; }

        /* ===== SECTIONS ===== */
        .sec { padding: 90px 24px; max-width: 1160px; margin: 0 auto; }
        .sec-head { text-align: center; margin-bottom: 52px; }
        .sec-head h2 { font-size: 34px; font-weight: 800; margin-bottom: 10px; }
        [data-theme="dark"] .sec-head h2 {
            background: linear-gradient(135deg,#fff,var(--accent-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        [data-theme="light"] .sec-head h2 { color: #1a202c; }
        .sec-head .bar { width: 50px; height: 3px; background: linear-gradient(90deg,#c9a84c,#e8d48b); margin: 0 auto; border-radius: 3px; }

        /* About */
        .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
        .about-txt p { font-size: 16px; line-height: 1.8; color: var(--text2); margin-bottom: 18px; font-weight: 300; }
        .about-txt strong { color: var(--text); font-weight: 600; }
        .about-img { border-radius: var(--radius); overflow: hidden; box-shadow: 0 16px 50px var(--shadow); border: 1px solid var(--border); }
        .about-img img { width: 100%; height: 420px; object-fit: cover; display: block; }

        /* Stats */
        .stats-band {
            background: var(--bg2); transition: background var(--transition);
            border-top: 1px solid var(--border2); border-bottom: 1px solid var(--border2);
        }
        .stats-row {
            display: grid; grid-template-columns: repeat(4,1fr); gap: 24px;
            max-width: 960px; margin: 0 auto; padding: 70px 24px;
        }
        .stat { text-align: center; padding: 24px 10px; }
        .stat-ic { margin-bottom: 14px; display: flex; justify-content: center; }
        .stat-ic svg { width: 36px; height: 36px; stroke: var(--icon-c); fill: none; stroke-width: 1.5; }
        .stat-val {
            font-size: 36px; font-weight: 800; margin-bottom: 6px;
            background: linear-gradient(135deg,#c9a84c,#e8d48b,#c9a84c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .stat-lbl { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 1.2px; }

        /* Features */
        .feat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
        .feat {
            background: linear-gradient(135deg,var(--surface),var(--surface2));
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 36px 26px; text-align: center; transition: all .3s;
            position: relative; overflow: hidden;
        }
        .feat::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 0%,var(--card-hover),transparent 70%);
            opacity: 0; transition: opacity .3s;
        }
        .feat:hover::before { opacity: 1; }
        .feat:hover { transform: translateY(-4px); box-shadow: 0 16px 40px var(--shadow); border-color: rgba(30,144,255,.2); }
        .feat-ic {
            width: 64px; height: 64px; border-radius: 50%; background: var(--icon-bg);
            display: flex; align-items: center; justify-content: center; margin: 0 auto 18px;
            position: relative; z-index: 1;
        }
        .feat-ic svg { width: 28px; height: 28px; stroke: var(--icon-c); fill: none; stroke-width: 1.5; }
        .feat h3 { font-size: 16px; font-weight: 700; margin-bottom: 10px; color: var(--text); position: relative; z-index: 1; }
        .feat p { font-size: 13px; color: var(--text2); line-height: 1.7; font-weight: 300; position: relative; z-index: 1; }

        /* Gallery */
        .gal-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
        .gal-item {
            border-radius: 14px; overflow: hidden; position: relative; cursor: pointer;
            border: 1px solid var(--border); transition: all .3s;
        }
        .gal-item:hover { transform: scale(1.02); box-shadow: 0 12px 36px var(--shadow); }
        .gal-item img { width: 100%; height: 280px; object-fit: cover; display: block; transition: transform .5s; }
        .gal-item:hover img { transform: scale(1.05); }
        .gal-item .cap {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent,rgba(10,22,40,.88));
            padding: 36px 14px 14px; font-size: 12px; color: #a0b0c4; font-weight: 400;
        }
        .gal-item.big { grid-column: span 2; grid-row: span 2; }
        .gal-item.big img { height: 100%; }

        /* Lightbox */
        .lightbox {
            position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,.92);
            backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity .3s; padding: 20px;
        }
        .lightbox.show { display: flex; opacity: 1; }
        .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 12px; object-fit: contain; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
        .lightbox-close {
            position: absolute; top: 20px; right: 24px; width: 44px; height: 44px;
            border: none; background: rgba(255,255,255,.1); border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background .2s;
        }
        .lightbox-close:hover { background: rgba(255,255,255,.2); }
        .lightbox-close svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2; }

        /* DeFi-U */
        .defiu-band {
            background: var(--bg2); transition: background var(--transition);
            border-top: 1px solid var(--border2); border-bottom: 1px solid var(--border2);
        }
        .defiu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; }
        .defiu-txt h3 { font-size: 22px; font-weight: 700; margin-bottom: 18px; color: var(--accent-light); }
        .defiu-txt p { font-size: 15px; line-height: 1.8; color: var(--text2); margin-bottom: 14px; font-weight: 300; }
        .steps { list-style: none; }
        .steps li { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 22px; }
        .snum {
            min-width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg,#1e90ff,#4da6ff); display: flex;
            align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: #fff;
            flex-shrink: 0;
        }
        .steps h4 { font-size: 15px; font-weight: 600; margin-bottom: 3px; color: var(--text); }
        .steps p { font-size: 13px; color: var(--text2); line-height: 1.5; margin: 0; }

        /* CTA */
        .cta-sec {
            text-align: center; padding: 90px 24px; position: relative; overflow: hidden;
            background: var(--cta-g); transition: background var(--transition);
        }
        .cta-sec::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse at center,rgba(30,144,255,.07) 0%,transparent 60%);
        }
        .cta-wrap { position: relative; z-index: 2; max-width: 660px; margin: 0 auto; }
        .cta-sec h2 { font-size: 36px; font-weight: 800; margin-bottom: 18px; line-height: 1.2; color: var(--text); }
        .cta-sec h2 span {
            background: linear-gradient(135deg,#c9a84c,#e8d48b,#c9a84c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .cta-sec p { font-size: 17px; color: var(--text2); margin-bottom: 36px; line-height: 1.6; font-weight: 300; }
        .btn-gold {
            display: inline-flex; align-items: center; gap: 12px;
            background: linear-gradient(135deg,#c9a84c,#e8d48b,#c9a84c);
            color: #0a1628; padding: 18px 44px; border-radius: 50px; text-decoration: none;
            font-weight: 800; font-size: 16px; transition: all .25s;
            box-shadow: 0 6px 25px rgba(201,168,76,.3);
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(201,168,76,.45); }

        /* Footer */
        footer {
            background: var(--bg2); transition: background var(--transition);
            border-top: 1px solid var(--border2); padding: 36px 24px; text-align: center;
        }
        [data-theme="dark"] footer { background: rgba(5,10,20,.8); }
        .foot-brand { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--accent-light); }
        footer p { font-size: 12px; color: var(--text3); }
        footer a { color: var(--accent); text-decoration: none; }

        /* Mobile sticky CTA */
        .mobile-cta {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 190;
            padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); transform: translateY(100%);
            transition: transform .35s cubic-bezier(.4,0,.2,1);
        }
        .mobile-cta.show { transform: translateY(0); }
        .mobile-cta a {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: linear-gradient(135deg,#1e90ff,#4da6ff); color: #fff;
            padding: 15px; border-radius: 14px; text-decoration: none;
            font-weight: 700; font-size: 15px; box-shadow: 0 4px 20px rgba(30,144,255,.3);
        }

        /* Back to top */
        .btt {
            position: fixed; bottom: 24px; right: 24px; z-index: 180;
            width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--nav-bg); backdrop-filter: blur(16px); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: translateY(20px); pointer-events: none;
            transition: all .3s;
        }
        .btt.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .btt:hover { border-color: var(--accent); }
        .btt svg { width: 18px; height: 18px; stroke: var(--icon-c); fill: none; stroke-width: 2; }

        /* ===== ANIMATIONS ===== */
        .reveal { opacity: 0; transform: translateY(28px); transition: opacity .7s, transform .7s cubic-bezier(.4,0,.2,1); }
        .reveal.vis { opacity: 1; transform: translateY(0); }
        .reveal-left { opacity: 0; transform: translateX(-30px); transition: opacity .7s, transform .7s cubic-bezier(.4,0,.2,1); }
        .reveal-left.vis { opacity: 1; transform: translateX(0); }
        .reveal-right { opacity: 0; transform: translateX(30px); transition: opacity .7s, transform .7s cubic-bezier(.4,0,.2,1); }
        .reveal-right.vis { opacity: 1; transform: translateX(0); }

        /* Counter animation handled in JS */
        .counter { display: inline-block; }

        /* ===== TABLET ===== */
        @media (max-width:960px) {
            .hero-txt h1 { font-size: 36px; }
            .hero-inner { gap: 32px; }
            .photo-wrap img { width: 240px; height: 240px; }
            .about-grid, .defiu-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(2,1fr); }
            .feat-grid { grid-template-columns: 1fr 1fr; }
            .gal-grid { grid-template-columns: 1fr 1fr; }
            .gal-item.big { grid-column: span 1; grid-row: span 1; }
            .gal-item.big img { height: 280px; }
        }

        /* ===== MOBILE ===== */
        @media (max-width:640px) {
            .nav { padding: 10px 16px; }
            .nav-links {
                display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: var(--nav-bg); backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                flex-direction: column; justify-content: center; align-items: center;
                gap: 28px; z-index: 150;

}

function setTheme(t){
    theme=t; document.documentElement.setAttribute('data-theme',t); localStorage.setItem('theme',t);
    document.getElementById('icSun').style.display=t==='dark'?'block':'none';
    document.getElementById('icMoon').style.display=t==='light'?'block':'none';
    document.querySelector('meta[name="theme-color"]').content=t==='dark'?'#0a1628':'#f4f7fb';
}

function toggleTheme(){setTheme(theme==='dark'?'light':'dark');}

// ===== INIT =====
setTheme(theme); setLang(lang);

// ===== NAV SCROLL =====
const nav=document.getElementById('nav');
const btt=document.getElementById('btt');
const mobCta=document.getElementById('mobCta');
const heroCta=document.getElementById('heroCta');

let ticking=false;
window.addEventListener('scroll',()=>{
    if(!ticking){requestAnimationFrame(()=>{
        const y=window.scrollY;
        nav.classList.toggle('scrolled',y>60);
        btt.classList.toggle('show',y>600);
        // Show mobile CTA after hero
        if(mobCta){
            const heroBottom=document.getElementById('hero').offsetHeight;
            mobCta.classList.toggle('show',y>heroBottom-200);
        }
        // Active nav link
        document.querySelectorAll('[data-sec]').forEach(a=>{
            const sec=document.getElementById(a.dataset.sec);
            if(sec){
                const r=sec.getBoundingClientRect();
                a.classList.toggle('active',r.top<200&&r.bottom>200);
            }
        });
        ticking=false;
    });ticking=true;}
},{passive:true});

// ===== BURGER =====
const burger=document.getElementById('burger');
const menu=document.getElementById('menu');
burger.addEventListener('click',()=>{
    burger.classList.toggle('open');
    menu.classList.toggle('open');
    document.body.style.overflow=menu.classList.contains('open')?'hidden':'';
});
menu.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{
    burger.classList.remove('open'); menu.classList.remove('open');
    document.body.style.overflow='';
}));

// ===== REVEAL ANIMATIONS =====
const revObs=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');revObs.unobserve(e.target);}});
},{threshold:.12,rootMargin:'0px 0px -40px 0px'});
document.querySelectorAll('.reveal,.reveal-left,.reveal-right').forEach(e=>revObs.observe(e));

// ===== COUNTER ANIMATION =====
let counted=false;
const cObs=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
        if(e.isIntersecting&&!counted){
            counted=true;
            document.querySelectorAll('.counter').forEach(c=>{
                const to=+c.dataset.to;
                const dur=1200;
                const start=performance.now();
                function tick(now){
                    const p=Math.min((now-start)/dur,1);
                    const ease=1-Math.pow(1-p,3);
                    c.textContent=Math.round(to*ease);
                    if(p<1)requestAnimationFrame(tick);
                }
                requestAnimationFrame(tick);
            });
        }
    });
},{threshold:.3});
document.querySelectorAll('.stats-band').forEach(e=>cObs.observe(e));

// ===== LIGHTBOX =====
const lb=document.getElementById('lb');
const lbImg=document.getElementById('lbImg');
function openLB(el){
    const src=el.querySelector('img').src;
    lbImg.src=src; lb.classList.add('show');
    document.body.style.overflow='hidden';
}
function closeLB(){lb.classList.remove('show');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB();});

// ===== PARTICLES =====
const pc=document.getElementById('particles');
for(let i=0;i<25;i++){
    const d=document.createElement('div');d.className='dot';
    d.style.left=Math.random()*100+'%';
    d.style.animationDelay=Math.random()*12+'s';
    d.style.animationDuration=(12+Math.random()*14)+'s';
    pc.appendChild(d);
}
</script>
