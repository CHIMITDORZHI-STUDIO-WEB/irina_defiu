<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ============ THEME VARIABLES ============ */
        :root {
            --accent: #1e90ff;
            --accent-light: #4da6ff;
            --gold: #c9a84c;
            --gold-light: #e8d48b;
        }

        [data-theme="dark"] {
            --primary: #0a1628;
            --secondary: #0f2847;
            --tertiary: #132d5e;
            --surface: rgba(15, 40, 71, 0.8);
            --surface2: rgba(10, 22, 40, 0.9);
            --white: #ffffff;
            --text: #ffffff;
            --text-secondary: #a0b0c4;
            --border: rgba(30, 144, 255, 0.12);
            --border-light: rgba(30, 144, 255, 0.08);
            --shadow: rgba(0, 0, 0, 0.4);
            --nav-bg: rgba(10, 22, 40, 0.95);
            --footer-bg: rgba(5, 10, 20, 0.8);
            --icon-bg: rgba(30, 144, 255, 0.12);
            --icon-stroke: #4da6ff;
            --stat-icon-stroke: #4da6ff;
        }

        [data-theme="light"] {
            --primary: #f0f4f8;
            --secondary: #e2e8f0;
            --tertiary: #cbd5e1;
            --surface: rgba(255, 255, 255, 0.9);
            --surface2: rgba(241, 245, 249, 0.95);
            --white: #ffffff;
            --text: #1a202c;
            --text-secondary: #4a5568;
            --border: rgba(30, 144, 255, 0.15);
            --border-light: rgba(30, 144, 255, 0.08);
            --shadow: rgba(0, 0, 0, 0.1);
            --nav-bg: rgba(255, 255, 255, 0.95);
            --footer-bg: #1a202c;
            --icon-bg: rgba(30, 144, 255, 0.1);
            --icon-stroke: #1e90ff;
            --stat-icon-stroke: #1e90ff;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--primary);
            color: var(--text);
            overflow-x: hidden;
            transition: background 0.4s, color 0.4s;
        }

        /* ============ NAV ============ */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 15px 30px; display: flex; justify-content: space-between;
            align-items: center; transition: all 0.3s ease;
        }

        .nav.scrolled {
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            box-shadow: 0 2px 20px var(--shadow);
        }

        .nav-logo { font-size: 20px; font-weight: 800; color: var(--text); text-decoration: none; }
        .nav-logo span { color: var(--accent); }

        .nav-right { display: flex; align-items: center; gap: 10px; }

        .nav-links { display: flex; gap: 25px; list-style: none; align-items: center; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: var(--text); }

        .nav-cta {
            background: linear-gradient(135deg, #1e90ff, #4da6ff);
            color: #fff !important; padding: 8px 22px; border-radius: 25px; font-weight: 600 !important;
        }

        /* Switchers */
        .switcher-group { display: flex; align-items: center; gap: 8px; }

        .pill-switcher {
            display: flex; align-items: center; gap: 2px;
            background: var(--icon-bg); border: 1px solid var(--border);
            border-radius: 25px; padding: 3px;
        }

        .pill-btn {
            padding: 5px 12px; border: none; background: transparent;
            color: var(--text-secondary); font-family: 'Montserrat', sans-serif;
            font-size: 12px; font-weight: 600; cursor: pointer;
            border-radius: 20px; transition: all 0.3s; letter-spacing: 0.5px;
        }

        .pill-btn.active { background: linear-gradient(135deg, #1e90ff, #4da6ff); color: #fff; }

        .theme-toggle {
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--icon-bg); cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.3s;
        }

        .theme-toggle svg { width: 18px; height: 18px; stroke: var(--icon-stroke); fill: none; stroke-width: 2; }
        .theme-toggle:hover { border-color: var(--accent); }

        .burger {
            display: none; flex-direction: column; gap: 5px;
            cursor: pointer; background: none; border: none; padding: 5px;
        }

        .burger span { width: 25px; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.3s; }

        /* ============ HERO ============ */
        .hero {
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; position: relative; overflow: hidden;
            transition: background 0.4s;
        }

        [data-theme="dark"] .hero {
            background: linear-gradient(135deg, #0a1628 0%, #0f2847 50%, #132d5e 100%);
        }

        [data-theme="light"] .hero {
            background: linear-gradient(135deg, #e8f0fe 0%, #d4e4f7 50%, #c3d9f0 100%);
        }

        .hero::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(30,144,255,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 20%, rgba(201,168,76,0.06) 0%, transparent 40%);
            animation: floatBg 20s ease-in-out infinite;
        }

        @keyframes floatBg {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            50% { transform: translate(-2%,2%) rotate(1deg); }
        }

        .hero-particles { position: absolute; width: 100%; height: 100%; overflow: hidden; }

        .particle {
            position: absolute; width: 3px; height: 3px;
            background: var(--accent); border-radius: 50%; opacity: 0.3;
            animation: particleFloat 15s linear infinite;
        }

        [data-theme="light"] .particle { opacity: 0.15; }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.3; } 90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .hero-content {
            position: relative; z-index: 2;
            display: flex; align-items: center; gap: 60px;
            max-width: 1200px; padding: 40px 20px;
            flex-wrap: wrap; justify-content: center;
        }

        .hero-photo-wrapper { position: relative; }

        .hero-photo-wrapper::before {
            content: ''; position: absolute; inset: -4px;
            border-radius: 50%; background: linear-gradient(135deg, #c9a84c, #e8d48b, #c9a84c);
            z-index: -1; animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(201,168,76,0.3); }
            50% { box-shadow: 0 0 60px rgba(201,168,76,0.5); }
        }

        .hero-photo {
            width: 300px; height: 300px; border-radius: 50%;
            object-fit: cover; object-position: center top;
            border: 4px solid var(--primary); display: block;
        }

        .hero-text { max-width: 550px; text-align: left; }

        .hero-badge {
            display: inline-flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.1));
            border: 1px solid var(--gold); border-radius: 30px;
            padding: 8px 20px; font-size: 13px; font-weight: 600;
            color: var(--gold); letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 20px;
        }

        .hero-badge svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 2; }

        .hero-text h1 {
            font-size: 48px; font-weight: 800; line-height: 1.1; margin-bottom: 16px;
        }

        [data-theme="dark"] .hero-text h1 {
            background: linear-gradient(135deg, #fff 0%, #a0b0c4 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        [data-theme="light"] .hero-text h1 { color: #1a202c; }

        .hero-text h1 span {
            background: linear-gradient(135deg, #c9a84c, #e8d48b, #c9a84c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .hero-text p { font-size: 18px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 30px; font-weight: 300; }

        .cta-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, #1e90ff, #4da6ff); color: #fff;
            padding: 16px 40px; border-radius: 50px; text-decoration: none;
            font-weight: 700; font-size: 16px; letter-spacing: 0.5px;
            transition: all 0.3s ease; box-shadow: 0 8px 30px rgba(30,144,255,0.3);
        }

        .cta-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(30,144,255,0.5); }
        .cta-btn .arrow { transition: transform 0.3s ease; font-size: 20px; }
        .cta-btn:hover .arrow { transform: translateX(5px); }

        .scroll-indicator {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); z-index: 2; animation: bounce 2s infinite; opacity: 0.5;
        }

        @keyframes bounce {
            0%,20%,50%,80%,100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        .scroll-indicator svg { width: 30px; height: 30px; stroke: var(--accent-light); fill: none; stroke-width: 2; }

        /* ============ SECTIONS ============ */
        .section { padding: 100px 20px; max-width: 1200px; margin: 0 auto; }
        .section-title { text-align: center; margin-bottom: 60px; }

        .section-title h2 {
            font-size: 36px; font-weight: 800; margin-bottom: 12px;
        }

        [data-theme="dark"] .section-title h2 {
            background: linear-gradient(135deg, #fff 0%, var(--accent-light) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        [data-theme="light"] .section-title h2 { color: #1a202c; }

        .section-title .line {
            width: 60px; height: 3px;
            background: linear-gradient(135deg, #c9a84c, #e8d48b, #c9a84c);
            margin: 0 auto; border-radius: 3px;
        }

        /* About */
        .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
        .about-text p { font-size: 17px; line-height: 1.8; color: var(--text-secondary); margin-bottom: 20px; font-weight: 300; }
        .about-text strong { color: var(--text); font-weight: 600; }

        .about-image {
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 60px var(--shadow); border: 1px solid var(--border);
        }

        .about-image img { width: 100%; height: 450px; object-fit: cover; display: block; }

        /* Stats */
        .stats-section {
            background: var(--secondary); transition: background 0.4s;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 30px; max-width: 1000px; margin: 0 auto; padding: 80px 20px;
        }

        .stat-card { text-align: center; padding: 30px 15px; }

        .stat-icon { margin-bottom: 18px; display: flex; justify-content: center; }
        .stat-icon svg { width: 40px; height: 40px; stroke: var(--stat-icon-stroke); fill: none; stroke-width: 1.5; }

        .stat-number {
            font-size: 38px; font-weight: 800;
            background: linear-gradient(135deg, #c9a84c, #e8d48b, #c9a84c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 8px;
        }

        .stat-label { font-size: 14px; color: var(--text-secondary); font-weight: 400; text-transform: uppercase; letter-spacing: 1px; }

        /* Features */
        .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }

        .feature-card {
            background: linear-gradient(135deg, var(--surface), var(--surface2));
            border: 1px solid var(--border); border-radius: 20px;
            padding: 40px 30px; text-align: center; transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px); border-color: rgba(30,144,255,0.3);
            box-shadow: 0 20px 40px var(--shadow);
        }

        .feature-icon {
            width: 70px; height: 70px; border-radius: 50%;
            background: var(--icon-bg); display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }

        .feature-icon svg { width: 32px; height: 32px; stroke: var(--icon-stroke); fill: none; stroke-width: 1.5; }

        .feature-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
        .feature-card p { font-size: 14px; color: var(--text-secondary); line-height: 1.7; font-weight: 300; }

        /* Gallery */
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        .gallery-item {
            border-radius: 16px; overflow: hidden; position: relative;
            cursor: pointer; border: 1px solid var(--border); transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.03); border-color: rgba(30,144,255,0.3);
            box-shadow: 0 10px 40px var(--shadow);
        }

        .gallery-item img { width: 100%; height: 300px; object-fit: cover; display: block; }

        .gallery-item .caption {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(10,22,40,0.9));
            padding: 40px 15px 15px; font-size: 13px; color: #a0b0c4; font-weight: 400;
        }

        .gallery-item.featured { grid-column: span 2; grid-row: span 2; }
        .gallery-item.featured img { height: 100%; }

        /* DeFi-U section */
        .defiu-section {
            background: var(--secondary); transition: background 0.4s;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }

        .defiu-content { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        .defiu-text h3 { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: var(--accent-light); }
        .defiu-text p { font-size: 16px; line-height: 1.8; color: var(--text-secondary); margin-bottom: 16px; font-weight: 300; }
        .defiu-steps { list-style: none; }
        .defiu-steps li { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 25px; }

        .step-num {
            min-width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, #1e90ff, #4da6ff); display: flex;
            align-items: center; justify-content: center;
            font-weight: 800; font-size: 18px; color: #fff;
        }

        .step-text h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
        .step-text p { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin: 0; }

        /* CTA */
        .cta-section {
            text-align: center; padding: 100px 20px;
            position: relative; overflow: hidden; transition: background 0.4s;
        }

        [data-theme="dark"] .cta-section {
            background: linear-gradient(135deg, #0a1628 0%, #0f2847 50%, #132d5e 100%);
        }

        [data-theme="light"] .cta-section {
            background: linear-gradient(135deg, #e8f0fe 0%, #d4e4f7 50%, #c3d9f0 100%);
        }

        .cta-section::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, rgba(30,144,255,0.08) 0%, transparent 60%);
        }

        .cta-inner { position: relative; z-index: 2; max-width: 700px; margin: 0 auto; }

        .cta-section h2 { font-size: 40px; font-weight: 800; margin-bottom: 20px; line-height: 1.2; color: var(--text); }

        .cta-section h2 span {
            background: linear-gradient(135deg, #c9a84c, #e8d48b, #c9a84c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .cta-section p { font-size: 18px; color: var(--text-secondary); margin-bottom: 40px; line-height: 1.6; font-weight: 300; }

        .cta-btn-large {
            display: inline-flex; align-items: center; gap: 12px;
            background: linear-gradient(135deg, #c9a84c, #e8d48b, #c9a84c);
            color: #0a1628; padding: 20px 50px; border-radius: 50px; text-decoration: none;
            font-weight: 800; font-size: 18px; letter-spacing: 0.5px;
            transition: all 0.3s ease; box-shadow: 0 8px 30px rgba(201,168,76,0.3);
        }

        .cta-btn-large:hover { transform: translateY(-3px); box-shadow: 0 12px 50px rgba(201,168,76,0.5); }

        /* Footer */
        footer {
            background: var(--footer-bg); transition: background 0.4s;
            border-top: 1px solid var(--border-light);
            padding: 40px 20px; text-align: center;
        }

        .footer-brand { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--accent-light); }
        footer p { font-size: 13px; color: rgba(160,176,196,0.5); }
        footer a { color: var(--accent); text-decoration: none; }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 900px) {
            .hero-text h1 { font-size: 36px; }
            .hero-content { gap: 30px; }
            .hero-photo { width: 240px; height: 240px; }
            .about-grid, .defiu-content { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .features-grid { grid-template-columns: 1fr 1fr; }
            .gallery-grid { grid-template-columns: 1fr 1fr; }
            .gallery-item.featured { grid-column: span 1; grid-row: span 1; }
            .gallery-item.featured img { height: 300px; }
        }

        @media (max-width: 600px) {
            .hero-text h1 { font-size: 28px; }
            .hero-text p { font-size: 15px; }
            .hero-photo { width: 200px; height: 200px; }
            .hero-text { text-align: center; }
            .hero-badge { font-size: 11px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .stat-number { font-size: 28px; }
            .features-grid { grid-template-columns: 1fr; }
            .gallery-grid { grid-template-columns: 1fr; }
            .section { padding: 60px 15px; }
            .cta-section h2 { font-size: 28px; }
            .section-title h2 { font-size: 28px; }

            .nav { padding: 12px 15px; }
            .nav-links {
                display: none; position: absolute; top: 100%; left: 0; right: 0;
                background: var(--nav-bg); backdrop-filter: blur(20px);
                flex-direction: column; padding: 20px 30px; gap: 15px;
                border-bottom: 1px solid var(--border);
            }

            .nav-links.open { display: flex; }
            .burger { display: flex; }
            .switcher-group { gap: 5px; }
            .pill-btn { padding: 4px 8px; font-size: 11px; }
        }

        /* Animations */
        .fade-in { opacity: 0; transform: translateY(30px); transition: all 0.8s ease; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>

            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
